apiVersion: apps/v1 
kind: Deployment 
metadata: 
    name: track3-app 
spec: 
    replicas: 1 
    selector: 
      matchLabels: 
        app: track3-app 
    template: 
      metadata: 
        labels: 
          app: track3-app 
      spec:    
        containers: 
        - name: track3-app 
          image: track3-app:v3
          imagePullPolicy: Never 
          ports: 
          - containerPort: 3000 
--- 
apiVersion: v1     
kind: Service 
metadata: 
    name: track3-app 
spec: 
  selector: 
    app: track3-app 
  ports: 
    - port: 80 
      targetPort: 3000 
  type: NodePort 
